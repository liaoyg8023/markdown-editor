<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown Editor</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <!-- 侧边栏 -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <h2 class="logo">
          <span class="logo-icon">&#9997;</span>
          <span>Markdown</span>
        </h2>
        <div class="sidebar-actions">
          <button id="btnOpenFile" class="btn-icon" title="打开文件">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          </button>
          <button id="btnOpenFolder" class="btn-icon" title="打开文件夹">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
          </button>
          <button id="btnNewFile" class="btn-icon" title="新建文件">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
          </button>
        </div>
      </div>
      <div class="sidebar-search">
        <input type="text" id="fileSearch" placeholder="搜索文件..." spellcheck="false">
      </div>
      <div id="fileList" class="file-list"></div>
    </aside>

    <!-- 主区域 -->
    <main id="main">
      <!-- 空状态 -->
      <div id="emptyState" class="empty-state">
        <div class="empty-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        </div>
        <h3>欢迎使用 Markdown Editor</h3>
        <p>新建、打开文件或导入文件夹开始编辑</p>
        <div class="empty-actions">
          <button id="btnStartNew" class="btn-primary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            新建文件
          </button>
          <button id="btnStartOpen" class="btn-secondary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            打开文件
          </button>
        </div>
      </div>

      <!-- 编辑器 -->
      <div id="editorArea" class="editor-area" style="display:none">
        <!-- 工具栏 -->
        <div class="toolbar" id="toolbar">
          <div class="toolbar-left">
            <input type="text" id="fileName" class="file-name-input" spellcheck="false">
            <span class="file-status" id="fileStatus"></span>
            <span class="toolbar-divider"></span>
            <button id="btnTogglePreview" class="btn-icon-sm" title="切换预览模式">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="12" y1="3" x2="12" y2="21"/></svg>
            </button>
            <button id="btnFullscreen" class="btn-icon-sm" title="全屏显示">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
            </button>
          </div>
          <div class="toolbar-right">
            <button class="tool-btn" data-cmd="h1" title="标题 1"><strong>H1</strong></button>
            <button class="tool-btn" data-cmd="h2" title="标题 2"><strong>H2</strong></button>
            <button class="tool-btn" data-cmd="h3" title="标题 3"><strong>H3</strong></button>
            <span class="toolbar-divider"></span>
            <button class="tool-btn" data-cmd="bold" title="加粗 Ctrl+B"><strong>B</strong></button>
            <button class="tool-btn" data-cmd="italic" title="斜体 Ctrl+I"><em>I</em></button>
            <button class="tool-btn" data-cmd="strikethrough" title="删除线"><s>S</s></button>
            <span class="toolbar-divider"></span>
            <button class="tool-btn" data-cmd="code" title="行内代码">&lt;/&gt;</button>
            <button class="tool-btn" data-cmd="codeblock" title="代码块">&#123; &#125;</button>
            <button class="tool-btn" data-cmd="quote" title="引用">&#8220;</button>
            <span class="toolbar-divider"></span>
            <button class="tool-btn" data-cmd="link" title="链接">&#128279;</button>
            <button class="tool-btn" data-cmd="image" title="图片">&#128247;</button>
            <span class="toolbar-divider"></span>
            <button class="tool-btn" data-cmd="ul" title="无序列表">&#8226;</button>
            <button class="tool-btn" data-cmd="ol" title="有序列表">1.</button>
            <button class="tool-btn" data-cmd="table" title="表格">&#9776;</button>
            <span class="toolbar-divider"></span>
            <button class="tool-btn" data-cmd="hr" title="水平线">&#8212;</button>
          </div>
        </div>

        <!-- 编辑器 & 预览 -->
        <div class="editor-body" id="editorBody">
          <div class="editor-pane" id="editorPane">
            <div class="pane-header">
              <span class="pane-title">Markdown</span>
              <div class="pane-actions">
                <button id="btnSave" class="btn-icon-sm" title="保存 Ctrl+S">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                </button>
                <button id="btnDownloadMd" class="btn-icon-sm" title="下载 .md 文件">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                </button>
                <button id="btnExportHtml" class="btn-icon-sm" title="导出 HTML">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
                </button>
                <button id="btnDeleteFile" class="btn-icon-sm btn-danger" title="删除文件">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                </button>
              </div>
            </div>
            <textarea id="editor" class="editor" spellcheck="false" placeholder="在此输入 Markdown..."></textarea>
          </div>
          <div class="resize-handle" id="resizeHandle"></div>
          <div class="preview-pane" id="previewPane">
            <div class="pane-header">
              <span class="pane-title">预览</span>
            </div>
            <div id="preview" class="preview markdown-body"></div>
          </div>
        </div>

        <!-- 状态栏 -->
        <div class="statusbar" id="statusbar">
          <span id="wordCount">字符: 0</span>
          <span id="lineCount">行: 1</span>
          <span id="fsaHint"></span>
          <span id="saveStatus">已保存</span>
        </div>
      </div>
    </main>

    <!-- Toast 通知 -->
    <div id="toast" class="toast"></div>
  </div>

  <!-- Popup resize handle (drag to resize popup window) -->
  <div class="popup-resize-handle" id="popupResizeHandle"></div>

  <!-- Hidden file inputs -->
  <input type="file" id="fileInput" accept=".md,text/markdown" style="display:none">
  <input type="file" id="folderInput" webkitdirectory style="display:none">

  <script src="../lib/markdown-parser.js"></script>
  <script src="../lib/mermaid.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
